version: '3.8'

services:
  api:
    build: .
    container_name: api-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./logs:/app/logs
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=example
      - DB_NAME=ticketing
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: sh -c "npm install && npx nodemon index.js"
    depends_on:
      - db
      - redis
    networks:
      - backend

  db:
    image: mysql:8.0
    container_name: mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: ticketing
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend

  adminer:
    image: adminer
    container_name: adminer-dev
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    networks:
      - backend

volumes:
  db_data:

networks:
  backend:
    driver: bridge
