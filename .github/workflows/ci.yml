name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run validate
      - name: Run unit tests
        run: npm test

  sonarcloud:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-image:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        run: |
          docker build -t ${{ github.repository }}:${{ github.sha }} .
      - name: Save Docker image as artifact
        run: |
          docker save ${{ github.repository }}:${{ github.sha }} | gzip > image.tar.gz
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz

  external-tests:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: |
          gunzip -c image.tar.gz | docker load
      - name: Start API and test DB
        run: |
          docker network create test-net
          docker run -d --name test-db --network test-net -e MYSQL_ROOT_PASSWORD=test -e MYSQL_DATABASE=testdb mysql:8
          docker run -d --name api --network test-net -e NODE_ENV=test -e DB_HOST=test-db -p 3000:3000 ${{ github.repository }}:${{ github.sha }}
          sleep 20
      - name: Run black-box tests
        run: |
          curl --fail http://localhost:3000/health
      - name: Stop containers
        if: always()
        run: |
          docker stop api test-db
          docker rm api test-db
          docker network rm test-net

  vulnerability-scan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: |
          gunzip -c image.tar.gz | docker load
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          image: ${{ github.repository }}:${{ github.sha }}

  publish:
    needs: [external-tests, vulnerability-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: |
          gunzip -c image.tar.gz | docker load
      - name: Push Docker image
        run: |
          docker push ${{ github.repository }}:${{ github.sha }}
