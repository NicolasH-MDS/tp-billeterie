version: '3.8'

services:
  api:
    image: mon-app-node:latest
    deploy:
      replicas: 4
      restart_policy:
        condition: on-failure
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=example
      - DB_NAME=ticketing
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENABLE_CACHE=true # Peut être changé à false pour désactiver Redis
    secrets:
      - jwt_secret
    depends_on:
      - db
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - backend

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: ticketing
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend

  redis:
    image: redis:alpine
    networks:
      - backend
    deploy:
      replicas: 1

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret

volumes:
  db_data:

networks:
  backend:
    driver: bridge
